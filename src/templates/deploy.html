<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Развертывание</title>
    <!-- Подключение Bootstrap (рекомендуется для стилизации) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <style>

        /* Базовые стили для шрифта */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            display: flex; /* Включаем flex для layout */
        }

        /* Стили для боковой панели */
        .sidebar {
            width: 240px; /* Фиксированная ширина */
            background-color: #2c3e50; /* Темно-синий фон */
            color: white;
            padding-top: 20px;
            height: 100vh; /* На всю высоту окна */
            box-shadow: 2px 0 5px rgba(0,0,0,0.1); /* Тень справа */
        }

        .sidebar-brand {
            text-align: center;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            background-color: #1a2538; /* Еще темнее полоска сверху */
        }

        .nav-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .nav-item {
            padding: 15px 25px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            color: #ecf0f1; /* Светло-серый текст */
            text-decoration: none;
            font-size: 1.1rem;
            border-radius: 6px;
            transition: background-color 0.2s, color 0.2s;
            padding-left: 15px; /* Отступ для иконки */
        }

        /* Иконки */
        .nav-link .icon {
             margin-right: 15px; /* Отступ между иконкой и текстом */
             font-size: 1.2rem;
         }

         /* Состояние при наведении */
         .nav-link:hover {
             background-color: #34495e; /* Светлее фон при наведении */
             color: #ffffff;
         }

         /* Активный пункт (можно добавить класс 'active' через JS) */
         .nav-link.active {
             background-color: #1abc9c; /* Зеленый для активной ссылки */
             color: white;
             font-weight: bold;
         }

         /* Адаптивность для мобильных устройств */
         @media (max-width: 768px) {
             .sidebar {
                 width: 100%;
                 height: auto;
                 box-shadow: none;
             }
             .sidebar-brand {
                 padding: 10px;
             }
             .nav-item {
                 padding: 12px 15px;
             }
         }
    </style>
    <nav class="sidebar">
        <div class="sidebar-brand">EmbCodeGen</div>
        <ul class="nav-list">
            <li class="nav-item">
                <a href="/dashboard" class="nav-link">
                    <span class="icon">🏠</span> Обзор
                </a>
            </li>
            <li class="nav-item">
                <a href="/code_generator" class="nav-link">
                    <span class="icon">⚡</span> Генератор кода
                </a>
            </li>
            <li class="nav-item">
                <a href="/deploy" class="nav-link">
                    <span class="icon">🚀</span> Развертывание
                </a>
            </li>
            <li class="nav-item">
                <a href="/audit" class="nav-link">
                    <span class="icon">🔍</span> Аудит
                </a>
            </li>
            <li class="nav-item">
                <a href="/admin_console" class="nav-link">
                    <span class="icon">🛠️</span> Панель администратора
                </a>
            </li>
        </ul>
    </nav>
    <div class="container mt-5">
        <h1 class="mb-4">Развертывание ПО</h1>
        <p>Текущий пользователь: {{ name }}</p>

        <form action="/deploy" method="POST" class="needs-validation" novalidate>
            <!-- Блок выбора устройств -->
            <div class="mb-4">
                <label for="devicesSelect" class="form-label">Выберите устройства:</label>
                <select name="devices" id="devicesSelect" class="form-select" multiple required size="15">
                    {% for device in devices %}
                        <!-- Предполагаем, что device это кортеж или список: (label, address, type) -->
                        <option value="{{ device[0] }}">{{ device[0] }} ({{ device[2] }}) - {{ device[1] }}</option>
                    {% endfor %}
                </select>
                <div class="invalid-feedback">
                    Пожалуйста, выберите хотя бы одно устройство.
                </div>
            </div>

            <!-- Блок выбора генерации -->
            <div class="mb-4">
                <label for="generationSelect" class="form-label">Выберите генерацию:</label>
                <select name="generation" id="generationSelect" class="form-select" required>
                    {% for gen in generations %}
                        <!-- Предполагаем, что gen это кортеж или список: (task, code) -->
                        <option value="{{ gen[0] }}">{{ gen[0] }} (Код: {{ gen[1] }})</option>
                    {% endfor %}
                </select>
                <div class="invalid-feedback">
                    Пожалуйста, выберите генерацию.
                </div>
            </div>

            <!-- Кнопка отправки -->
            <button type="submit" class="btn btn-primary">Начать установку</button>
        </form>
    </div>

    <!-- Скрипт для валидации форм Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
