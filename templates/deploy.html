<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Развертывание</title>
    <!-- Подключение Bootstrap (рекомендуется для стилизации) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h1 class="mb-4">Развертывание ПО</h1>
        <p>Текущий пользователь: {{ name }}</p>

        <form action="/deploy" method="POST" class="needs-validation" novalidate>
            <!-- Блок выбора устройств -->
            <div class="mb-4">
                <label for="devicesSelect" class="form-label">Выберите устройства:</label>
                <select name="devices" id="devicesSelect" class="form-select" multiple required size="15">
                    {% for device in devices %}
                        <!-- Предполагаем, что device это кортеж или список: (label, address, type) -->
                        <option value="{{ device[0] }}">{{ device[0] }} ({{ device[2] }}) - {{ device[1] }}</option>
                    {% endfor %}
                </select>
                <div class="invalid-feedback">
                    Пожалуйста, выберите хотя бы одно устройство.
                </div>
            </div>

            <!-- Блок выбора генерации -->
            <div class="mb-4">
                <label for="generationSelect" class="form-label">Выберите генерацию:</label>
                <select name="generation" id="generationSelect" class="form-select" required>
                    {% for gen in generations %}
                        <!-- Предполагаем, что gen это кортеж или список: (task, code) -->
                        <option value="{{ gen[0] }}">{{ gen[0] }} (Код: {{ gen[1] }})</option>
                    {% endfor %}
                </select>
                <div class="invalid-feedback">
                    Пожалуйста, выберите генерацию.
                </div>
            </div>

            <!-- Кнопка отправки -->
            <button type="submit" class="btn btn-primary">Начать установку</button>
        </form>
    </div>

    <!-- Скрипт для валидации форм Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
