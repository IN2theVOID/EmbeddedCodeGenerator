<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Уведомление</title>
    <style>

        /* Базовые стили для шрифта */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            display: flex; /* Включаем flex для layout */
        }

        /* Стили для боковой панели */
        .sidebar {
            width: 240px; /* Фиксированная ширина */
            background-color: #2c3e50; /* Темно-синий фон */
            color: white;
            padding-top: 20px;
            height: 100vh; /* На всю высоту окна */
            box-shadow: 2px 0 5px rgba(0,0,0,0.1); /* Тень справа */
        }

        .sidebar-brand {
            text-align: center;
            padding: 20px;
            font-size: 1.5rem;
            font-weight: bold;
            background-color: #1a2538; /* Еще темнее полоска сверху */
        }

        .nav-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }

        .nav-item {
            padding: 15px 25px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            color: #ecf0f1; /* Светло-серый текст */
            text-decoration: none;
            font-size: 1.1rem;
            border-radius: 6px;
            transition: background-color 0.2s, color 0.2s;
            padding-left: 15px; /* Отступ для иконки */
        }

        /* Иконки */
        .nav-link .icon {
             margin-right: 15px; /* Отступ между иконкой и текстом */
             font-size: 1.2rem;
         }

         /* Состояние при наведении */
         .nav-link:hover {
             background-color: #34495e; /* Светлее фон при наведении */
             color: #ffffff;
         }

         /* Активный пункт (можно добавить класс 'active' через JS) */
         .nav-link.active {
             background-color: #1abc9c; /* Зеленый для активной ссылки */
             color: white;
             font-weight: bold;
         }

         /* Адаптивность для мобильных устройств */
         @media (max-width: 768px) {
             .sidebar {
                 width: 100%;
                 height: auto;
                 box-shadow: none;
             }
             .sidebar-brand {
                 padding: 10px;
             }
             .nav-item {
                 padding: 12px 15px;
             }
         }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .notification-box {
            background-color: #fefefe;
            border-left: 6px solid #007bff; /* Цветная линия слева */
            padding: 25px 35px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.07);
            max-width: 600px;
        }

        .notification-title {
             font-size: 1.5rem;
             color: #2c3e50;
             margin-bottom: 15px;
             font-weight: bold;
         }

         .notification-body {
             font-size: 1.1rem;
             color: #666666;
             line-height: 1.6;
         }

         .close-btn {
             margin-top: 25px;
             padding: 10px 22px;
             background-color: #e9ecef; /* Светло-серый */
             color: #495057; /* Темно-серый */
             border-radius: 6px;
             border: none;
             cursor: pointer;
         }
         .close-btn:hover {
             background-color: #dee2e6; /* Еще светлее */
         }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-brand">EmbCodeGen</div>
        <ul class="nav-list">
            <li class="nav-item">
                <a href="/dashboard" class="nav-link">
                    <span class="icon">🏠</span> Обзор
                </a>
            </li>
            <li class="nav-item">
                <a href="/code_generator" class="nav-link">
                    <span class="icon">⚡</span> Генератор кода
                </a>
            </li>
            <li class="nav-item">
                <a href="/deploy" class="nav-link">
                    <span class="icon">🚀</span> Развертывание
                </a>
            </li>
            <li class="nav-item">
                <a href="/audit" class="nav-link">
                    <span class="icon">🔍</span> Аудит
                </a>
            </li>
            <li class="nav-item">
                <a href="/admin_console" class="nav-link">
                    <span class="icon">🛠️</span> Панель администратора
                </a>
            </li>
        </ul>
    </nav>
    <div class="notification-box">
        <h2 class="notification-title">Информация</h2>
        <p class="notification-body">
           {{ message }}
        </p>
        <button class="close-btn">Закрыть</button>
    </div>
</body>
</html>
